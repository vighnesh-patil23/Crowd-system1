<!DOCTYPE html>
<html>
<head>
<title>Live Monitoring</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    font-size:22px;
}

/* FILTER */
.filter{
    text-align:center;
}

select,button{
    padding:10px;
    margin:5px;
}

/* CARDS */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:#1e293b;
    margin:10px;
    padding:15px;
    width:250px;
    border-radius:10px;
}

.card img{
    width:100%;
}

.count{
    color:red;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="header">📊 Live Monitoring</div>

<div class="filter">
<form method="post">
<select name="village">
<option>Tirpan</option>
<option>Kotoli</option>
<option>Shirgao</option>
<option>Kerli</option>
</select>

<select name="chowk">
<option>Chowk1</option>
<option>Chowk2</option>
<option>Chowk3</option>
</select>

<button>View</button>
</form>
</div>

<canvas id="chart"></canvas>

<div class="container">
{% for row in data %}
<div class="card">
<p><b>{{row[2]}} - {{row[3]}}</b></p>
<p>Time: {{row[1]}}</p>
<p class="count">People: {{row[4]}}</p>
<img src="/uploads/{{row[5]}}">
</div>
{% endfor %}
</div>

<script>
var ctx = document.getElementById('chart');

new Chart(ctx,{
    type:'line',
    data:{
        labels:[{% for g in graph_data %}"{{g[0]}}",{% endfor %}],
        datasets:[{
            label:'Crowd',
            data:[{% for g in graph_data %}{{g[1]}},{% endfor %}],
            borderColor:'cyan'
        }]
    }
});
</script>

</body>
</html>
