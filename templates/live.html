<!DOCTYPE html>
<html>
<head>
<title>Live Monitoring</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f19;
    color:white;
}

/* SIDEBAR */
.sidebar{
    width:200px;
    height:100vh;
    background:#111827;
    position:fixed;
    padding:20px;
}

.sidebar h2{
    color:#facc15;
}

.sidebar div{
    margin:20px 0;
    cursor:pointer;
}

/* MAIN */
.main{
    margin-left:220px;
    padding:20px;
}

/* TOP */
.top{
    display:flex;
    justify-content:space-between;
}

/* CARDS */
.cards{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.card{
    flex:1;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

/* FILTER */
.filter{
    margin-top:20px;
}

/* DATA */
.container{
    display:flex;
    flex-wrap:wrap;
}

.box{
    width:260px;
    background:#1e293b;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.box img{
    width:100%;
}

.count{
    color:#facc15;
    font-weight:bold;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>⚡ Smart</h2>

<div onclick="location.href='/dashboard'">🏠 Dashboard</div>
<div>📊 Live</div>
<div onclick="location.href='/complaint'">📩 Complaint</div>
<div onclick="location.href='/logout'">🚪 Logout</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="top">
<h2>📊 Live Monitoring</h2>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">Alerts: {{data|length}}</div>
<div class="card">Villages: 4</div>
<div class="card">Status: Active</div>
</div>

<!-- FILTER -->
<div class="filter">
<form method="post">

<select name="village">
<option>Tirpan</option>
<option>Kotoli</option>
<option>Shirgao</option>
<option>Kerli</option>
</select>

<select name="chowk">
<option>Chowk1</option>
<option>Chowk2</option>
<option>Chowk3</option>
</select>

<button>View</button>

</form>
</div>

<!-- GRAPH -->
<canvas id="chart"></canvas>

<!-- DATA -->
<div class="container">

{% for row in data %}
<div class="box">
<p><b>{{row[2]}} - {{row[3]}}</b></p>
<p>Time: {{row[1]}}</p>
<p class="count">People: {{row[4]}}</p>
<img src="/uploads/{{row[5]}}">
</div>
{% endfor %}

</div>

</div>

<script>
var ctx = document.getElementById('chart');

new Chart(ctx,{
    type:'line',
    data:{
        labels:[{% for g in graph_data %}"{{g[0]}}",{% endfor %}],
        datasets:[{
            label:'Crowd Count',
            data:[{% for g in graph_data %}{{g[1]}},{% endfor %}],
            borderColor:'#facc15'
        }]
    }
});
</script>

</body>
</html>
