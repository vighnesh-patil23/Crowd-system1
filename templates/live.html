<!DOCTYPE html>
<html>
<head>
<title>Live Monitoring</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f19;
    color:white;
}

/* SIDEBAR */
.sidebar{
    width:200px;
    height:100vh;
    background:#111827;
    position:fixed;
    padding:20px;
}

.sidebar h2{
    color:#facc15;
}

.sidebar div{
    margin:20px 0;
    cursor:pointer;
}

/* MAIN */
.main{
    margin-left:220px;
    padding:20px;
}

/* CARDS */
.cards{
    display:flex;
    gap:15px;
}

.card{
    flex:1;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

/* FILTER CENTER */
.filter-box{
    margin-top:30px;
    text-align:center;
}

.select{
    padding:12px;
    border-radius:8px;
    border:none;
    margin:10px;
    background:#1e293b;
    color:white;
}

button{
    padding:12px 20px;
    background:#06b6d4;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* DATA */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.box{
    width:260px;
    background:#1e293b;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.box img{
    width:100%;
}

.count{
    color:#facc15;
    font-weight:bold;
}

/* FLOAT GRAPH BUTTON */
#graphBtn{
    position:fixed;
    right:20px;
    bottom:20px;
    padding:15px;
    border-radius:50%;
    background:#06b6d4;
    border:none;
    cursor:pointer;
    font-size:18px;
}

/* GRAPH POPUP */
#graphPopup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#111827;
    padding:20px;
    border-radius:10px;
    width:70%;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>⚡ Smart</h2>

<div>📊 Live</div>
<div onclick="location.href='/complaint'">📩 Complaint</div>
<div onclick="location.href='/logout'">🚪 Logout</div>

</div>

<!-- MAIN -->
<div class="main">

<h2>📊 Live Monitoring</h2>

<!-- CARDS -->
<div class="cards">
<div class="card">Alerts: {{data|length}}</div>
<div class="card">Villages: 4</div>
<div class="card">Status: Active</div>
</div>

<!-- FILTER -->
<div class="filter-box">
<form method="post">

<select class="select" name="village">
<option>Select Village</option>
<option>Tirpan</option>
<option>Kotoli</option>
<option>Shirgao</option>
<option>Kerli</option>
</select>

<select class="select" name="chowk">
<option>Select Chowk</option>
<option>Chowk1</option>
<option>Chowk2</option>
<option>Chowk3</option>
</select>

<button>View</button>

</form>
</div>

<!-- DATA -->
<div class="container">

{% for row in data %}
<div class="box">
<p><b>{{row[2]}} - {{row[3]}}</b></p>
<p>Time: {{row[1]}}</p>
<p class="count">People: {{row[4]}}</p>
<img src="/uploads/{{row[5]}}">
</div>
{% endfor %}

</div>

</div>

<!-- FLOAT BUTTON -->
<button id="graphBtn">📈</button>

<!-- GRAPH POPUP -->
<div id="graphPopup">
<canvas id="chart"></canvas>
<br>
<button onclick="closeGraph()">Close</button>
</div>

<script>

// OPEN GRAPH
document.getElementById("graphBtn").onclick = function(){
    document.getElementById("graphPopup").style.display="block";
}

// CLOSE GRAPH
function closeGraph(){
    document.getElementById("graphPopup").style.display="none";
}

// GRAPH DATA
{% if graph_data %}
var ctx = document.getElementById('chart');

new Chart(ctx,{
    type:'line',
    data:{
        labels:[{% for g in graph_data %}"{{g[0]}}",{% endfor %}],
        datasets:[{
            label:'Crowd Count',
            data:[{% for g in graph_data %}{{g[1]}},{% endfor %}],
            borderColor:'#facc15'
        }]
    }
});
{% endif %}

</script>

</body>
</html>
