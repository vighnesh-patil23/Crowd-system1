<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(to right,#141e30,#243b55);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#1c1c1c;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
    color:white;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
    color:#ffd700;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    background:#ffd700;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#e6c200;
}

</style>

</head>

<body>

<div class="container">

<h2>🚨 Crowd System Login</h2>

<form method="post">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

</div>

</body>
</html>
