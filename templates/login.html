<!DOCTYPE html>
<html>
<head>
<title>Smart Crowd System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family: Arial;
    background: url("YOUR_IMAGE_URL") no-repeat center center/cover;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MAIN */
.container{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
}

/* CARD */
.box{
    background: rgba(0, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    padding:25px;
    border-radius:15px;
    width:260px;
    color:#00e6ff;
    text-align:center;
    border:1px solid rgba(0,255,255,0.4);
    box-shadow:0 0 20px rgba(0,255,255,0.3);
}

h2{
    margin-bottom:15px;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:transparent;
    border:1px solid #00e6ff;
    border-radius:5px;
    color:white;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#00e6ff;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00bcd4;
}

/* PASSWORD */
.input-box{
    position:relative;
}

.eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<!-- 🔐 ADMIN LOGIN -->
<div class="box">
<h2>🔐 Admin Login</h2>

<form method="post" action="/admin_login">

<input name="username" placeholder="Username" required>

<div class="input-box">
<input id="admin_pass" name="password" type="password" placeholder="Password" required>
<span class="eye" onclick="toggleAdmin()">👁️</span>
</div>

<button>Login</button>
</form>

</div>

<!-- 👤 CITIZEN LOGIN -->
<div class="box">
<h2>👤 Citizen Login</h2>

<form method="post" action="/user_login">

<input name="username" placeholder="Username" required>

<div class="input-box">
<input id="user_pass" name="password" type="password" placeholder="Password" required>
<span class="eye" onclick="toggleUser()">👁️</span>
</div>

<button>Login</button>
</form>

</div>

<!-- 📝 REGISTER -->
<div class="box">
<h2>📝 Register</h2>

<form method="post" action="/register">

<input name="username" placeholder="Create Username" required>

<input name="password" type="password" placeholder="Create Password" required>

<button>Register</button>

</form>

</div>

</div>

<script>

function toggleAdmin(){
    var x = document.getElementById("admin_pass");
    x.type = x.type === "password" ? "text" : "password";
}

function toggleUser(){
    var x = document.getElementById("user_pass");
    x.type = x.type === "password" ? "text" : "password";
}

</script>

</body>
</html>
