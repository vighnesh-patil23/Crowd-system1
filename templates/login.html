<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("https://media.istockphoto.com/id/1311084163/photo/security-guard-watching-video-monitoring-surveillance-security-system.jpg") no-repeat center/cover;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    gap:40px;
}

.box{
    background:rgba(0,0,0,0.85);
    padding:30px;
    border-radius:12px;
    width:280px;
    color:#00e6ff;
    box-shadow:0 0 25px rgba(0,255,255,0.5);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#111;
    border:1px solid #00e6ff;
    color:white;
}

button{
    width:100%;
    padding:10px;
    background:#00e6ff;
    border:none;
    font-weight:bold;
}

.error{
    color:red;
    text-align:center;
}
</style>

</head>

<body>

<div class="container">

<!-- AUTHORITY -->
<div class="box">
<h2>🔐 Authority</h2>

<form method="post">
<input type="hidden" name="role" value="authority">
<input name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">
<button>Login</button>
</form>

</div>

<!-- CITIZEN -->
<div class="box">
<h2>👤 Citizen</h2>

<form method="post">
<input type="hidden" name="role" value="citizen">
<input name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">
<button>Login</button>
</form>

<p style="text-align:center;">
<a href="/register" style="color:#00e6ff;">New user? Register</a>
</p>

</div>

</div>

<p class="error">{{message}}</p>

</body>
</html>
