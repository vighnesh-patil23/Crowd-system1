<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1920&auto=format&fit=crop") no-repeat center/cover;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:rgba(0,0,0,0.85);
    padding:30px;
    border-radius:12px;
    width:300px;
    color:#00e6ff;
    box-shadow:0 0 25px rgba(0,255,255,0.5);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#111;
    border:1px solid #00e6ff;
    color:white;
}

button{
    width:100%;
    padding:10px;
    background:#00e6ff;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00bcd4;
}

.message{
    margin-top:10px;
    font-size:14px;
}

.success{
    color:#00ff99;
}

.error{
    color:red;
}

a{
    color:#00e6ff;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="box">
<h2>📝 Register</h2>

<form method="post">
<input name="username" placeholder="Enter Username" required>
<input type="password" name="password" placeholder="Enter Password" required>
<button type="submit">Register</button>
</form>

<!-- MESSAGE -->
{% if message %}
<p class="message">
{{message}}
</p>
{% endif %}

<br>
<a href="/">⬅ Back to Login</a>

</div>

</div>

</body>
</html>
