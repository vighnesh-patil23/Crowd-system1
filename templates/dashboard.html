<!DOCTYPE html>
<html>
<head>
<title>Smart Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family: Arial;
    background:#111;
    color:white;
    display:flex;
}

/* 🔥 SIDEBAR */
.sidebar{
    width:200px;
    background:#1c1c1c;
    height:100vh;
    padding:20px;
}

.sidebar h2{
    color:#ffd700;
}

.sidebar a{
    display:block;
    padding:10px;
    color:white;
    text-decoration:none;
}

.sidebar a:hover{
    background:#333;
}

/* 🔥 MAIN */
.main{
    flex:1;
    padding:20px;
}

/* 🔥 TOP CARDS */
.top{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.card-top{
    background:#222;
    padding:20px;
    border-radius:10px;
    flex:1;
    min-width:150px;
    text-align:center;
}

.highlight{
    background:#ffd700;
    color:black;
}

/* 🔥 FILTER */
.filter{
    margin:20px 0;
}

select,button{
    padding:10px;
    margin:5px;
    border-radius:5px;
    border:none;
}

button{
    background:#ffd700;
    cursor:pointer;
}

/* 🔥 DATA CARDS */
.grid{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.data-card{
    background:#222;
    padding:15px;
    border-radius:10px;
    width:250px;
}

.data-card img{
    width:100%;
    border-radius:8px;
}

.count{
    color:#ff4d4d;
    font-weight:bold;
}

.delete{
    background:red;
    color:white;
    width:100%;
    margin-top:10px;
}

</style>

</head>

<body>

<!-- 🔥 SIDEBAR -->
<div class="sidebar">
<h2>🚨 Crowd</h2>
<a href="#">Dashboard</a>
<a href="#">Reports</a>
<a href="#">Settings</a>
<a href="/logout">Logout</a>
</div>

<!-- 🔥 MAIN -->
<div class="main">

<h1>Smart Crowd Monitoring</h1>

<!-- 🔥 TOP STATS -->
<div class="top">

<div class="card-top highlight">
<h2>Total Alerts</h2>
<p>{{data|length}}</p>
</div>

<div class="card-top">
<h2>System Status</h2>
<p>Active</p>
</div>

<div class="card-top">
<h2>Mode</h2>
<p>Live Monitoring</p>
</div>

</div>

<!-- 🔥 FILTER -->
<div class="filter">

<form method="post">
<select name="village">
<option value="">Village</option>
<option>Tirpan</option>
<option>Kotoli</option>
<option>Shirgao</option>
<option>Kerli</option>
</select>

<select name="chowk">
<option value="">Chowk</option>
<option>Chowk1</option>
<option>Chowk2</option>
<option>Chowk3</option>
</select>

<button>View</button>
</form>

</div>

<!-- 🔥 DATA -->
<div class="grid">

{% for row in data %}
<div class="data-card">

<p><b>Time:</b> {{row[1]}}</p>
<p><b>{{row[2]}} - {{row[3]}}</b></p>

<p class="count">People: {{row[4]}}</p>

<img src="/uploads/{{row[5]}}">

<form method="post" action="/delete">
<input type="hidden" name="village" value="{{row[2]}}">
<input type="hidden" name="chowk" value="{{row[3]}}">
<button class="delete">Delete</button>
</form>

</div>
{% endfor %}

</div>

</div>

</body>
</html>
