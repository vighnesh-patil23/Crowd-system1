<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    background:linear-gradient(135deg,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* CARD */
.box{
    background:#111827;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 40px rgba(0,0,0,0.5);
    text-align:center;
}

h1{
    margin-bottom:30px;
}

/* BUTTON */
.btn{
    display:block;
    width:250px;
    margin:15px auto;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#06b6d4;
    color:white;
    transition:0.3s;
}

.btn:hover{
    background:#0891b2;
}
</style>

</head>

<body>

<div class="box">

<h1>🚨 Smart Monitoring System</h1>

<button class="btn" onclick="location.href='/live'">
📊 Live Monitoring
</button>

<button class="btn" onclick="location.href='/complaint'">
📩 Complaints
</button>

</div>

</body>
</html>
