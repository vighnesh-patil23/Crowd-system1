<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    height:100vh;
    background:linear-gradient(135deg,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* BOX */
.box{
    background:#111827;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    text-align:center;
    width:320px;
}

h1{
    margin-bottom:25px;
}

/* ROLE TEXT */
.role{
    font-size:14px;
    margin-bottom:20px;
    color:#22c55e;
}

/* BUTTON */
.btn{
    display:block;
    width:100%;
    margin:10px 0;
    padding:15px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#06b6d4;
    color:white;
    transition:0.3s;
}

.btn:hover{
    background:#0891b2;
}

/* LOGOUT */
.logout{
    background:#ef4444;
}

.logout:hover{
    background:#dc2626;
}
</style>

</head>

<body>

<div class="box">

<h1>🚨 Smart Monitoring</h1>

<div class="role">
Logged in as: {{session['user']}}
</div>

<!-- ================= ADMIN ================= -->
{% if session['role'] == 'admin' %}

<button class="btn" onclick="location.href='/live'">
📊 Live Monitoring
</button>

<button class="btn" onclick="location.href='/complaint'">
📩 View Complaints
</button>

{% endif %}

<!-- ================= CITIZEN ================= -->
{% if session['role'] == 'citizen' %}

<button class="btn" onclick="location.href='/citizen_complaint'">
📩 Submit Complaint
</button>

<button class="btn" onclick="location.href='/my_complaints'">
📄 My Complaints
</button>

{% endif %}

<!-- ================= LOGOUT ================= -->
<button class="btn logout" onclick="location.href='/logout'">
🚪 Logout
</button>

</div>

</body>
</html>
