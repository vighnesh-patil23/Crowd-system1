<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<meta http-equiv="refresh" content="5">

<style>
body{
    font-family: Arial;
    background: linear-gradient(to right,#eef2f3,#8e9eab);
}

.header{
    background:#2a5298;
    color:white;
    padding:15px;
    text-align:center;
    font-size:26px;
}

.select-box{
    text-align:center;
    margin:20px;
}

select,button{
    padding:10px;
    margin:5px;
    border-radius:5px;
}

button{
    background:#2a5298;
    color:white;
    border:none;
}

.delete-btn{
    background:red;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:white;
    margin:15px;
    padding:15px;
    width:270px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

.card img{
    width:100%;
}

.count{
    color:red;
    font-weight:bold;
}
</style>

<script>
function updateChowk() {
    var village = document.getElementById("village").value;
    var chowk = document.getElementById("chowk");

    chowk.innerHTML = "";

    chowk.innerHTML = "<option>Chowk1</option><option>Chowk2</option><option>Chowk3</option>";
}
</script>

</head>

<body>

<div class="header">
🚨 Crowd Monitoring Dashboard
</div>

<div class="select-box">

<form method="post">
<select id="village" name="village" onchange="updateChowk()">
<option value="">Select Village</option>
<option>Tirpan</option>
<option>Kotoli</option>
<option>Shirgao</option>
<option>Kerli</option>
</select>

<select id="chowk" name="chowk">
<option>Select Chowk</option>
</select>

<button>View</button>
</form>

<form method="post" action="/delete">
<select name="village">
<option>Tirpan</option>
<option>Kotoli</option>
<option>Shirgao</option>
<option>Kerli</option>
</select>

<select name="chowk">
<option>Chowk1</option>
<option>Chowk2</option>
<option>Chowk3</option>
</select>

<button class="delete-btn">Delete Data</button>
</form>

</div>

<div class="container">

{% for row in data %}
<div class="card">
<p><b>Time:</b> {{row[1]}}</p>
<p><b>Village:</b> {{row[2]}}</p>
<p><b>Chowk:</b> {{row[3]}}</p>
<p class="count">People: {{row[4]}}</p>
<img src="/uploads/{{row[5]}}">
</div>
{% endfor %}

</div>

</body>
</html>
