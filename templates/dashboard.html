<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

/* HEADER */
.header{
    padding:15px;
    text-align:center;
    background:#020617;
    font-size:22px;
}

/* FILTER */
.filter{
    text-align:center;
    padding:15px;
}

select,button{
    padding:10px;
    margin:5px;
    border-radius:5px;
    border:none;
}

button{
    background:#06b6d4;
    color:white;
    cursor:pointer;
}

/* TABS */
.tabs{
    text-align:center;
}

.tabs button{
    background:#1e293b;
}

/* CARDS */
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:#1e293b;
    width:280px;
    margin:10px;
    padding:15px;
    border-radius:10px;
}

.card img{
    width:100%;
    border-radius:8px;
}

.count{
    color:red;
    font-weight:bold;
}

/* DELETE BUTTON */
.delete{
    background:red;
    width:100%;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
🚨 Smart Crowd Monitoring Dashboard
</div>

<!-- FILTER -->
<div class="filter">

<form method="post">
<select name="village">
<option value="">Select Village</option>
<option>Tirpan</option>
<option>Kotoli</option>
<option>Shirgao</option>
<option>Kerli</option>
</select>

<select name="chowk">
<option value="">Select Chowk</option>
<option>Chowk1</option>
<option>Chowk2</option>
<option>Chowk3</option>
</select>

<button type="submit">View</button>
</form>

</div>

<!-- TABS -->
<div class="tabs">
<button onclick="showLive()">Live Monitoring</button>
<button onclick="showComplaint()">Complaints</button>
</div>

<!-- LIVE DATA -->
<div id="live" class="container">

{% for row in data %}
<div class="card">

<p><b>Time:</b> {{row[1]}}</p>
<p><b>{{row[2]}} - {{row[3]}}</b></p>

<p class="count">People: {{row[4]}}</p>

<img src="/uploads/{{row[5]}}">

<!-- DELETE -->
<form method="post" action="/delete">
<input type="hidden" name="id" value="{{row[0]}}">
<button class="delete">Delete</button>
</form>

</div>
{% endfor %}

</div>

<!-- COMPLAINT DATA -->
<div id="complaint" class="container" style="display:none;">

{% for c in complaints %}
<div class="card">

<p><b>Time:</b> {{c[4]}}</p>
<p><b>Village:</b> {{c[1]}}</p>

<p>{{c[2]}}</p>

<img src="/uploads/{{c[3]}}">

<!-- DELETE -->
<form method="post" action="/delete_complaint">
<input type="hidden" name="id" value="{{c[0]}}">
<button class="delete">Delete</button>
</form>

</div>
{% endfor %}

</div>

<script>

function showLive(){
    document.getElementById("live").style.display="flex";
    document.getElementById("complaint").style.display="none";
}

function showComplaint(){
    document.getElementById("live").style.display="none";
    document.getElementById("complaint").style.display="flex";
}

</script>

</body>
</html>
